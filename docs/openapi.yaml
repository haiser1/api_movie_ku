openapi: 3.0.3
info:
  title: Movie Web App API
  description: |
    REST API for Movie Web App.

    ## Authentication
    Using **Google OAuth2** for login and **JWT Bearer Token** for accessing endpoints that require authentication.

    ## Roles
    - **guest** — Public access without authentication
    - **user** — User that has logged in via Google OAuth
    - **admin** — Administrator with full access
  version: 1.0.0
  contact:
    name: API Support

servers:
  - url: http://localhost:5000
    description: Local development
  - url: https://movie-ku-api.vercel.app
    description: Production

tags:
  - name: Auth
    description: Authentication & authorization (Google OAuth2 + JWT)
  - name: Movies
    description: Movie browsing, search, and filtering (public)
  - name: User Movies
    description: User-created movies management (authenticated)
  - name: Wishlist
    description: User's movie wishlist (authenticated)
  - name: Admin Movies
    description: Admin movie management
  - name: Admin Users
    description: Admin user management (admin only)
  - name: Admin Sync
    description: TMDB sync management (admin only)
  - name: Admin Dashboard
    description: Analytics dashboard (admin only)
  - name: Genres
    description: Movie genres
  - name: Health
    description: Application health check

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from Google OAuth login

  schemas:
    # --- Base Response ---
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
      required: [success, message]

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        error:
          type: string
      required: [success, message]

    # --- Auth ---
    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Access token expiration time in seconds
          example: 300
      required: [access_token, refresh_token, token_type, expires_in]

    RefreshTokenRequest:
      type: object
      properties:
        refresh_token:
          type: string
      required: [refresh_token]

    RegisterUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        email:
          type: string
          format: email
          minLength: 5
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 255
      required: [name, email, password]

    LoginUserPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 5
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 255
      required: [email, password]

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [user, admin]
        profile_picture:
          type: string
          nullable: true
        oauth_provider:
          type: string
          nullable: true
      required: [id, name, email, role]

    UserUpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        profile_picture:
          type: string
          maxLength: 500
          nullable: true

    UserChangePasswordRequest:
      type: object
      properties:
        old_password:
          type: string
          minLength: 1
        new_password:
          type: string
          minLength: 8
          maxLength: 255
      required: [old_password, new_password]

    # --- Genre ---
    Genre:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
      required: [id, name]

    # --- Movie Image ---
    MovieImage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        image_type:
          type: string
          enum: [poster, backdrop]
        image_url:
          type: string
        width:
          type: integer
          nullable: true
        height:
          type: integer
          nullable: true

    # --- Movie Video ---
    MovieVideo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        video_type:
          type: string
          enum: [trailer, teaser]
        site:
          type: string
          enum: [youtube, vimeo]
        video_key:
          type: string
        official:
          type: boolean

    # --- Movie ---
    Movie:
      type: object
      properties:
        id:
          type: string
          format: uuid
        api_id:
          type: string
          nullable: true
          description: TMDB API ID (null if user-created)
        source:
          type: string
          enum: [tmdb, user]
        title:
          type: string
        overview:
          type: string
          nullable: true
        release_date:
          type: string
          format: date
          nullable: true
        popularity:
          type: number
          format: float
          nullable: true
        rating:
          type: number
          format: float
          nullable: true
        is_featured:
          type: boolean
        status:
          type: string
          enum: [active, archived]
        created_by:
          type: string
          format: uuid
          nullable: true
        genres:
          type: array
          items:
            $ref: "#/components/schemas/Genre"
        images:
          type: array
          items:
            $ref: "#/components/schemas/MovieImage"
        videos:
          type: array
          items:
            $ref: "#/components/schemas/MovieVideo"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, source, title, status, created_at, updated_at]

    MovieCreateRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
        overview:
          type: string
        release_date:
          type: string
          format: date
        genre_ids:
          type: array
          items:
            type: string
            format: uuid
          description: List of genre UUIDs
      required: [title]

    MovieUpdateRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
        overview:
          type: string
        release_date:
          type: string
          format: date
        genre_ids:
          type: array
          items:
            type: string
            format: uuid

    AdminMovieCreateRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
        overview:
          type: string
        release_date:
          type: string
          format: date
        popularity:
          type: number
          format: float
        rating:
          type: number
          format: float
        is_featured:
          type: boolean
        status:
          type: string
          enum: [active, archived]
        genre_ids:
          type: array
          items:
            type: string
            format: uuid
      required: [title]

    AdminMovieUpdateRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
        overview:
          type: string
        release_date:
          type: string
          format: date
        popularity:
          type: number
          format: float
        rating:
          type: number
          format: float
        is_featured:
          type: boolean
        status:
          type: string
          enum: [active, archived]
        genre_ids:
          type: array
          items:
            type: string
            format: uuid

    # --- Wishlist ---
    Wishlist:
      type: object
      properties:
        id:
          type: string
          format: uuid
        movie_id:
          type: string
          format: uuid
        movie:
          $ref: "#/components/schemas/Movie"
        scheduled_watch_date:
          type: string
          format: date
          nullable: true
        reminder_sent:
          type: boolean
        created_at:
          type: string
          format: date-time
      required: [id, movie_id, created_at]

    WishlistCreateRequest:
      type: object
      properties:
        movie_id:
          type: string
          format: uuid
        scheduled_watch_date:
          type: string
          format: date
      required: [movie_id]

    WishlistUpdateRequest:
      type: object
      properties:
        scheduled_watch_date:
          type: string
          format: date

    # --- Admin Dashboard ---
    DashboardDateRange:
      type: object
      properties:
        start_date:
          type: string
          format: date
          example: "2026-02-05"
        end_date:
          type: string
          format: date
          example: "2026-03-07"

    DashboardSummary:
      type: object
      properties:
        total_movies:
          type: integer
          description: Movies created within date range
        total_users:
          type: integer
          description: Users registered within date range
        total_wishlists:
          type: integer
          description: Wishlists created within date range
        total_movies_all:
          type: integer
          description: Total movies (all time)
        total_users_all:
          type: integer
          description: Total users (all time)
        total_wishlists_all:
          type: integer
          description: Total wishlists (all time)
        top_genre:
          type: string
          nullable: true
          description: Most popular genre by movie count
        latest_movie:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            title:
              type: string
            created_at:
              type: string
              format: date-time
        average_rating:
          type: number
          format: float
          description: Average movie rating

    PieChartItem:
      type: object
      properties:
        label:
          type: string
        value:
          type: integer
        percentage:
          type: number
          format: float
          description: Percentage of this item relative to total (2 decimal places)
          example: 23.45
      required: [label, value, percentage]

    ColumnChartDailyItem:
      type: object
      properties:
        date:
          type: string
          format: date
        count:
          type: integer
      required: [date, count]

    ColumnChartRangeItem:
      type: object
      properties:
        range:
          type: string
          example: "6-8"
        count:
          type: integer
      required: [range, count]

    DashboardPieCharts:
      type: object
      properties:
        movies_by_genre:
          type: array
          items:
            $ref: "#/components/schemas/PieChartItem"
          description: Distribution of movies per genre (top 10)
        movies_by_source:
          type: array
          items:
            $ref: "#/components/schemas/PieChartItem"
          description: Movies by source (tmdb, user, admin)
        movies_by_status:
          type: array
          items:
            $ref: "#/components/schemas/PieChartItem"
          description: Movies by status (active, archived)
        sync_by_status:
          type: array
          items:
            $ref: "#/components/schemas/PieChartItem"
          description: Sync logs by status (success, failed)

    DashboardColumnCharts:
      type: object
      properties:
        movies_per_day:
          type: array
          items:
            $ref: "#/components/schemas/ColumnChartDailyItem"
          description: New movies added per day
        wishlists_per_day:
          type: array
          items:
            $ref: "#/components/schemas/ColumnChartDailyItem"
          description: Wishlists created per day
        users_per_day:
          type: array
          items:
            $ref: "#/components/schemas/ColumnChartDailyItem"
          description: New user registrations per day
        rating_distribution:
          type: array
          items:
            $ref: "#/components/schemas/ColumnChartRangeItem"
          description: Movies grouped by rating range (0-2, 2-4, 4-6, 6-8, 8-10)

    DashboardAnalytics:
      type: object
      properties:
        date_range:
          $ref: "#/components/schemas/DashboardDateRange"
        summary:
          $ref: "#/components/schemas/DashboardSummary"
        pie_charts:
          $ref: "#/components/schemas/DashboardPieCharts"
        column_charts:
          $ref: "#/components/schemas/DashboardColumnCharts"
      required: [date_range, summary, pie_charts, column_charts]

    # --- Admin User Management ---
    AdminUserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [user, admin]
        profile_picture:
          type: string
          nullable: true
        oauth_provider:
          type: string
          nullable: true
          description: 'google, github, or null if manually created'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, name, email, role, created_at, updated_at]

    AdminCreateUserRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
        role:
          type: string
          enum: [user, admin]
          default: user
        profile_picture:
          type: string
          nullable: true
          maxLength: 500
      required: [name, email]

    AdminUpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        role:
          type: string
          enum: [user, admin]
          description: Admin cannot change their own role.
        profile_picture:
          type: string
          nullable: true
          maxLength: 500

    SyncMoviesRequest:
      type: object
      properties:
        mode:
          type: string
          enum: [full, changes]
          default: full
          description: |
            Sync mode. Both `full` and `changes` sync page-by-page.
            `full` syncs from TMDB list endpoints. `changes` syncs recent changes (last 14 days).
        endpoint:
          type: string
          nullable: true
          description: |
            TMDB endpoint path (e.g. "/movie/popular"). Only for `full` mode.
            If null on the first call, the backend returns the starting endpoint.
          example: "/movie/popular"
        page:
          type: integer
          minimum: 1
          default: 1
          description: Which page to process for this batch call. Works for both `full` and `changes` mode.
        max_pages:
          type: integer
          minimum: 1
          maximum: 500
          nullable: true
          description: Optional limit on the number of pages per endpoint.
        sync_log_id:
          type: string
          format: uuid
          nullable: true
          description: UUID of the SyncLog to resume. If provided, accumulates progress in this log. Required for subsequent batch calls to track stats correctly.

    SyncStopRequest:
      type: object
      properties:
        sync_log_id:
          type: string
          format: uuid
          description: UUID of the SyncLog to stop.
      required: [sync_log_id]

    SyncBatchResponse:
      type: object
      properties:
        status:
          type: string
          enum: [in_progress, completed, failed]
        endpoint:
          type: string
          nullable: true
        current_page:
          type: integer
          nullable: true
        next_endpoint:
          type: string
          nullable: true
          description: The next endpoint to request. Null when completed.
        next_page:
          type: integer
          nullable: true
          description: The next page to request. Null when completed.
        total_pages:
          type: integer
          nullable: true
        batch_inserted:
          type: integer
        batch_updated:
          type: integer
        cumulative_inserted:
          type: integer
        cumulative_updated:
          type: integer
        sync_log_id:
          type: string
          format: uuid
          nullable: true
      required: [status, batch_inserted, batch_updated, cumulative_inserted, cumulative_updated]

    # --- Sync ---
    SyncLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sync_type:
          type: string
          enum: [full, changes]
        last_sync_at:
          type: string
          format: date-time
        total_inserted:
          type: integer
        total_updated:
          type: integer
        status:
          type: string
          enum: [success, failed, in_progress, stopped]
        last_synced_endpoint:
          type: string
          nullable: true
        last_synced_page:
          type: integer
          nullable: true
        error_message:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
      required: [id, sync_type, last_sync_at, status, created_at]

    # --- Pagination ---
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 20
        total:
          type: integer
        total_pages:
          type: integer

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
      description: Page number

    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: Items per page

    SortParam:
      name: sort
      in: query
      schema:
        type: string
        enum: [title, release_date, popularity, rating, created_at]
        default: created_at
      description: Field to sort by

    OrderParam:
      name: order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
      description: Sort order

paths:
  # ==================== HEALTH ====================
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Application is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  database:
                    type: string
                    example: connected
                  timestamp:
                    type: number
        "503":
          description: Application is degraded

  # ==================== AUTH ====================
  /api/auth/google/login:
    get:
      tags: [Auth]
      summary: Initiate Google OAuth2 login
      operationId: googleLogin
      description: Redirects to Google OAuth consent screen. After authorization, Google redirects to callback URL.
      responses:
        "302":
          description: Redirect to Google OAuth consent page

  /api/auth/google/callback:
    get:
      tags: [Auth]
      summary: Google OAuth2 callback
      operationId: googleCallback
      description: Handles the OAuth2 callback from Google. Exchanges auth code for tokens, creates/updates user, returns JWT tokens.
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: refreshToken
      description: Exchange a valid refresh token for a new access token pair.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      operationId: getCurrentUser
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User profile retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      operationId: logout
      description: |
        Logout endpoint. Since JWT is stateless, actual token invalidation
        requires a token blacklist (e.g. Redis). Client should discard tokens.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user with email and password
      operationId: registerUser
      description: |
        Create a new user account using name, email, and password.
        Returns the created user profile (without tokens — user must login separately).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterUserRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserProfile"
        "400":
          description: Validation error or account deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/email-password/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      operationId: loginEmailPassword
      description: |
        Authenticate a user using email and password credentials.
        Returns JWT tokens and sets them as HTTP-only cookies.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginUserPasswordRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Invalid credentials or account deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ==================== USER PROFILE ====================
  /api/users/me:
    put:
      tags: [User Profile]
      summary: Update current user profile
      operationId: updateCurrentUserProfile
      description: Update the authenticated user's profile information (name, profile_picture).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateProfileRequest"
      responses:
        "200":
          description: User profile updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                  - properties:
                      data:
                        $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/users/me/password:
    put:
      tags: [User Profile]
      summary: Change user password
      operationId: changeUserPassword
      description: Change the authenticated user's password. Requires old password and new password.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserChangePasswordRequest"
      responses:
        "200":
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Bad Request (OAuth users without password, or incorrect old password)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ==================== MOVIES (PUBLIC) ====================
