  # ==================== ADMIN SYNC ====================
  /api/admin/tmdb/sync/movies:
    post:
      tags: [Admin Sync]
      summary: Sync movies from TMDB (batch, one page per call)
      operationId: triggerMoviesSync
      description: |
        Synchronous batch sync with TMDB API. Supports two modes:

        **Full mode (`mode: "full"`):**
        Processes one TMDB page (~20 movies) per request. The frontend drives
        pagination by reading `next_endpoint` and `next_page` from each response
        and calling this endpoint again until `status: "completed"`.

        Flow:
        1. First call: `{ "mode": "full" }` — syncs genres and returns starting endpoint/page.
        2. Subsequent calls: `{ "endpoint": "...", "page": N }` — processes one page.
        3. Read `next_endpoint` + `next_page` from response to continue.
        4. Stop when `status: "completed"` is returned.

        **Changes mode (`mode: "changes"`):**
        Incremental sync — updates only movies changed in the last 14 days.
        Runs in a single synchronous call.
      security:
        - BearerAuth: []
      requestBody:
        description: Sync options
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncMoviesRequest"
      responses:
        "200":
          description: Sync completed (changes mode or final full-sync page)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SyncBatchResponse"
        "202":
          description: Batch processed, more pages remaining (full mode)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SyncBatchResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/tmdb/sync/stop:
    post:
      tags: [Admin Sync]
      summary: Stop an ongoing batch sync
      operationId: stopMovieSync
      description: |
        Manually mark a running batch sync as stopped.
      security:
        - BearerAuth: []
      requestBody:
        description: Request body containing sync_log_id
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncStopRequest"
      responses:
        "200":
          description: Sync stopped successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SyncLog"
        "400":
          description: Bad request (e.g. invalid status or not found, mapped to 404/400)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/tmdb/sync/last-sync:
    get:
      tags: [Admin Sync]
      summary: Get last completed sync log
      operationId: getLastSync
      description: |
        Returns the most recent sync log entry from the database.
